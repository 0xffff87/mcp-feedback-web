services:
  mcp-web-feedback:
    build: .
    container_name: mcp-web-feedback
    ports:
      - "8765:8765"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
